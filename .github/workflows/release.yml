name: Release

# Builds every distributable on a version tag (and on demand).
#
# PyInstaller cannot cross-compile, so there is one job per target rather than a
# matrix on a single runner. Every job runs the test suite and the headless --smoke
# check before packaging: a broken build should never reach a release page.
#
# Binaries are unsigned — Windows SmartScreen and macOS Gatekeeper will warn on first
# run. That is documented in the README and docs/ai/GOTCHAS.md.
#
# Build jobs only upload artifacts; the single `release` job at the bottom publishes
# them. Letting all five build jobs create the release themselves means five runners
# racing to create the same thing — which ends in a duplicate-create error or a
# release page that is missing whichever platform lost the race.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      windows_only:
        description: "Build only Windows (faster iteration; artifacts only, never publishes)"
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  # 64-bit only. PyQt6 publishes no 32-bit Windows wheel (win_amd64 and win_arm64
  # only), so pip falls back to the source tarball and tries to build Qt with qmake,
  # which fails. A 32-bit build would mean compiling Qt from source for x86 — not a
  # realistic proposition for this project. See docs/ai/GOTCHAS.md.
  windows:
    name: Windows (x64)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          architecture: x64

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]" pyinstaller

      - name: Tests
        run: pytest -q

      - name: Smoke gate
        run: python -m laydown --smoke
        env:
          QT_QPA_PLATFORM: offscreen

      # The MSIX must be signed with the SAME certificate every release, or users
      # have to re-trust on every update. The stable self-signed cert lives in repo
      # secrets; without it the build script mints a per-run throwaway, whose public
      # half dies with the runner — that is exactly the 0x800B010A users hit on the
      # first 0.3.0 MSIX.
      - name: Restore the MSIX signing certificate
        env:
          PFX_B64: ${{ secrets.LAYDOWN_CERT_PFX_B64 }}
        run: |
          # (the secrets context is not allowed in a step-level `if:`, so the
          # presence check lives here instead)
          if (-not $env:PFX_B64) {
            Write-Host "No signing secret available - build.ps1 will mint a throwaway cert"
            exit 0
          }
          New-Item -ItemType Directory -Force certs | Out-Null
          [IO.File]::WriteAllBytes("$PWD\certs\Laydown.pfx", [Convert]::FromBase64String($env:PFX_B64))
          Write-Host "Stable signing certificate restored"

      - name: Build portable ZIP + MSIX
        run: powershell -ExecutionPolicy Bypass -File packaging\windows\build.ps1
        env:
          LAYDOWN_CERT_PASSWORD: ${{ secrets.LAYDOWN_CERT_PASSWORD }}

      - uses: actions/upload-artifact@v4
        with:
          name: laydown-windows-x64
          path: |
            dist/Laydown-*-windows-*-portable.zip
            dist/Laydown-*-windows-x64.msix
            dist/Laydown-msix-signing.cer
          if-no-files-found: error


  linux:
    name: Linux (x86_64)
    # Skipped when a dispatch asks for Windows only; always runs on a tag release.
    if: ${{ !(github.event_name == 'workflow_dispatch' && inputs.windows_only) }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: System deps for headless Qt
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb libegl1 libxkbcommon-x11-0 libxcb-cursor0 \
            libxcb-icccm4 libxcb-keysyms1 libxcb-shape0

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]" pyinstaller

      - name: Tests
        run: xvfb-run -a pytest -q

      - name: Smoke gate
        run: xvfb-run -a python -m laydown --smoke

      - name: Build tar.gz
        run: bash packaging/linux/build.sh

      - name: Smoke gate on the built bundle
        run: |
          tar -xzf dist/Laydown-*-linux-x86_64.tar.gz -C /tmp
          xvfb-run -a /tmp/Laydown-*-linux-x86_64/Laydown --smoke

      - uses: actions/upload-artifact@v4
        with:
          name: laydown-linux
          path: dist/Laydown-*-linux-x86_64.tar.gz
          if-no-files-found: error


  macos:
    name: macOS (${{ matrix.arch }})
    # Skipped when a dispatch asks for Windows only; always runs on a tag release.
    if: ${{ !(github.event_name == 'workflow_dispatch' && inputs.windows_only) }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Hosted runner labels get retired: macos-13 was removed entirely, and a
          # job that requests a retired label is not rejected — it queues forever
          # waiting for a machine that will never come, blocking the release gate.
          # macos-15-intel is GitHub's current Intel image.
          - runner: macos-15         # Apple silicon
            arch: arm64
          - runner: macos-15-intel   # Intel
            arch: x86_64
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]" pyinstaller

      - name: Tests
        run: pytest -q
        env:
          QT_QPA_PLATFORM: offscreen

      - name: Smoke gate
        run: python -m laydown --smoke

      - name: Build .dmg
        run: bash packaging/macos/build.sh

      - uses: actions/upload-artifact@v4
        with:
          name: laydown-macos-${{ matrix.arch }}
          path: dist/Laydown-*-macos-*.dmg
          if-no-files-found: error

  release:
    name: Publish the release
    needs: [windows, linux, macos]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Collect every platform's artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Show what will be published
        run: ls -lh artifacts

      - name: Publish
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          fail_on_unmatched_files: true
          body: |
            PDF imposition for print — lay your pages out on the press sheet.

            **Windows, no setup** — the `-portable.zip`: unzip, run `Laydown.exe`
            (SmartScreen will warn once: **More info → Run anyway**). 64-bit only
            (PyQt6 ships no 32-bit Windows packages).

            **Windows, installed (MSIX)** — the package is signed with the project's
            own certificate, and Windows only installs what it trusts, so the first
            time you need one elevated-PowerShell moment in your download folder:

            ```powershell
            Import-Certificate -FilePath .\Laydown-msix-signing.cer -CertStoreLocation Cert:\LocalMachine\TrustedPeople
            Add-AppxPackage (Get-Item .\Laydown-*-windows-x64.msix)
            ```

            That trust is one-time — future releases are signed with the same
            certificate. (Skipping the first line gets you error 0x800B010A.)

            **macOS** — `.dmg`, drag to Applications. First launch: right-click → Open.
            **Linux** — extract the `.tar.gz` and run `./Laydown`. No Python needed.

            What changed is in [CHANGELOG.md](https://github.com/danielmevit/laydown/blob/main/CHANGELOG.md).
            The site is at https://danielmevit.github.io/laydown/.

            **Upgrading from PressReady?** This app was called PressReady up to 0.3.0
            (renamed to avoid clashing with Fujifilm's product of the same name). To
            Windows the old install is a different app, so remove it once:
            `Get-AppxPackage PressReadyTeam.PressReady | Remove-AppxPackage` — and the
            certificate trust starts fresh too, hence the Import-Certificate step above.
